name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and prepare portfolio
        run: |
          rm -rf _site
          mkdir _site
          unzip -q portfolio.zip -d _site
          test -f _site/index.html
          sed -i '/<div class="kpi-baseline">/d' _site/index.html
          cat deployment-overrides.css >> _site/styles.css

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publish website
        id: deployment
        uses: actions/deploy-pages@v4
